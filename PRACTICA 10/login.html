<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Inicia sesión en Read Books">
    <meta name="author" content="Sara Romero">
    <link rel="stylesheet" href="assets/css/style.css">
    <title>Iniciar sesión | Read Books</title>
</head>

<body>

<header class="cabecera">
    <div class="header_container">
        <a href="index.html">
            <img class="logo_imagen" src="assets/images/logo.png" alt="Logo de la web">
        </a>
        <h1>Read Books</h1>
    </div>
</header>

<main class="login_container">

    <section class="login_card">

        <h2>Iniciar sesión</h2>
        <p class="login_subtexto">Accede a tu biblioteca personal</p>

        <form id="loginForm" class="login_form">

            <div class="input_group">
                <label for="usuario">Usuario</label>
                <input type="text" id="usuario" name="usuario">
            </div>

            <div class="input_group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>

            <div class="login_options">
                <label class="checkbox">
                    <input type="checkbox"> Recordarme
                </label>

                <a href="#" class="forgot">¿Olvidaste tu contraseña?</a>
            </div>

            <button type="submit" class="boton secundario login_btn">
                Entrar
            </button>

        </form>

        <p class="registro">
            ¿No tienes cuenta?
            <a href="#">Regístrate</a>
        </p>

    </section>
</main>
<script src="assets/js/script.js"></script>
</body>
</html>
